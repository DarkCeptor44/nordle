name: Publish Docker Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    permissions:
      packages: write
      contents: read
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Lowercase username
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}:${{ github.ref_name }}-${{ matrix.arch }}

  merge:
    name: Merge Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs: build
    permissions:
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase username
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Create and push manifest
        run: |
          docker buildx imagetools create -t ghcr.io/${{ env.REPO_LC }}:${{ github.ref_name }} \
            ghcr.io/${{ env.REPO_LC }}:${{ github.ref_name }}-amd64 \
            ghcr.io/${{ env.REPO_LC }}:${{ github.ref_name }}-arm64

          docker buildx imagetools create -t ghcr.io/${{ env.REPO_LC }}:latest \
            ghcr.io/${{ env.REPO_LC }}:${{ github.ref_name }}-amd64 \
            ghcr.io/${{ env.REPO_LC }}:${{ github.ref_name }}-arm64
