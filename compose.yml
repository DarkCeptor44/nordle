services:
    nordle:
        container_name: nordle
        image: ghcr.io/darkceptor44/nordle:latest
        restart: unless-stopped
        ports:
            - 8080:8080
        volumes:
            - /etc/localtime:/etc/localtime:ro # for correct timestamp in logs
        environment:
            - NORDLE_PORT=8080 # not needed if you dont change the default
            - NORDLE_HOST=0.0.0.0 # not needed if you dont change the default
            #- NORDLE_CACHE_SIZE=100  # default is 100
            #- NORDLE_DEBUG=true  # default is false
        deploy:
            resources:
                limits:
                    memory: 10m # you probably wont need more than 10MB of RAM
